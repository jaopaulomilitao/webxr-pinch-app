<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebXR Pinch Interaction</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        
        #background_video {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1;
        }

        canvas {
            position: absolute; top: 0; left: 0;
            width: 100vw !important; height: 100vh !important;
            z-index: 2; pointer-events: none;
        }

        #camera_toggle_btn {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%); z-index: 10;
            padding: 12px 24px; font-size: 16px; font-weight: bold;
            background-color: rgba(255, 255, 255, 0.8);
            border: none; border-radius: 25px; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* o painel de debug na interface é adicionado */
        #debug_panel {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            padding: 15px; background: rgba(0, 0, 0, 0.7);
            color: white; border-radius: 8px; font-size: 36px;
        }
    </style>
</head>
<body>
    <video id="background_video" autoplay playsinline></video>
    <div id="debug_panel">Gesture: <span id="gesture_status">None</span></div>
    <button id="camera_toggle_btn">Switch Camera</button>
    <script type="module" src="/main.js"></script>
</body>
</html>
